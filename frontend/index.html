<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default SEO (overridden per-page by react-helmet-async) -->
    <title>FileShare — Send Files Online Free | No Signup Required</title>
    <meta name="description" content="Send files of any size directly between devices. No account, no cloud upload. Pure P2P file transfer via browser. Free forever." />
    <meta name="keywords" content="send files online free, transfer files between devices, p2p file transfer, share files without account, send large files free" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="FileShare" />
    <meta property="og:title"       content="FileShare — Send Files Online Free" />
    <meta property="og:description" content="Transfer files of any size directly between devices. Nothing uploaded to servers. Free forever." />
    <meta property="og:image"       content="/og-home.png" />

    <!-- Twitter -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="FileShare — Send Files Online Free" />
    <meta name="twitter:description" content="P2P file transfer. No signup. No cloud." />

    <!-- Schema.org structured data (helps Google understand the site) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "FileShare",
      "url": "https://yourdomain.com",
      "description": "Free P2P file transfer. Send files of any size directly between devices without signup.",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <!-- STEP 1: Google AdSense site verification -->

  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
